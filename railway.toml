[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd frontend && npm ci && npm run build && cd .. && uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[volumes]]
mountPath = "/data"
